# =============================================================================
# pipeline.conf — single source of truth for the DIY genetics pipeline
# =============================================================================
# Edit values here; every stage script sources this file. Keep it POSIX-ish
# bash (it is sourced, not executed). Do not put logic here — only assignments.
# =============================================================================

# ---- Machine-specific overrides ---------------------------------------------
# Optional, gitignored config/local.conf for per-host paths — e.g. pointing the
# large data roots at a separate big disk while source stays on the fast/small
# disk. Sourced FIRST so the ${VAR:-default} defaults below honor whatever it
# sets. See config/local.conf.example.
_conf_dir="$(cd "$(dirname "${BASH_SOURCE[0]:-.}")" && pwd)"
[[ -f "${_conf_dir}/local.conf" ]] && source "${_conf_dir}/local.conf"

# ---- Directory roots --------------------------------------------------------
# Defined here so path defaults below (FASTQ, references) resolve to ABSOLUTE
# paths — required for Docker/Parabricks identity bind-mounts to work.
# On the workstation, point REF_DIR/DATA_DIR/RESULTS_DIR at the 4 TB drive via
# config/local.conf; source stays on the 1 TB disk at PROJECT_ROOT.
PROJECT_ROOT="${PROJECT_ROOT:-$(cd "$(dirname "${BASH_SOURCE[0]:-.}")/.." && pwd)}"
REF_DIR="${REF_DIR:-${PROJECT_ROOT}/references}"
DATA_DIR="${DATA_DIR:-${PROJECT_ROOT}/data}"
RESULTS_DIR="${RESULTS_DIR:-${PROJECT_ROOT}/results}"
LOG_DIR="${LOG_DIR:-${PROJECT_ROOT}/logs}"

# ---- Sample -----------------------------------------------------------------
# Short identifier for this genome. Drives all output filenames.
SAMPLE="${SAMPLE:-sample01}"

# Input reads. Paired-end FASTQ downloaded from your sequencing vendor.
# Point these at your actual files (may be .fastq.gz). Used by stage 01.
FASTQ_R1="${FASTQ_R1:-${DATA_DIR:-data}/${SAMPLE}_R1.fastq.gz}"
FASTQ_R2="${FASTQ_R2:-${DATA_DIR:-data}/${SAMPLE}_R2.fastq.gz}"

# Read-group metadata embedded during alignment (GATK requires a valid @RG).
RG_ID="${RG_ID:-${SAMPLE}.L1}"
RG_LB="${RG_LB:-${SAMPLE}.lib1}"
RG_PL="${RG_PL:-ILLUMINA}"
RG_SM="${RG_SM:-${SAMPLE}}"

# ---- Compute ----------------------------------------------------------------
THREADS="${THREADS:-8}"          # CPU threads for bwa-mem2 / samtools / gatk
MEM_GB="${MEM_GB:-32}"           # Java heap ceiling for GATK (GB)

# ---- Variant caller ---------------------------------------------------------
# gatk       -> GATK4 HaplotypeCaller (CPU; runs BQSR in stage 02). Always works.
# parabricks -> NVIDIA Parabricks GPU germline (FASTQ->VCF in one accelerated
#               stage; REPLACES stages 01/02/03). Needs an NVIDIA GPU + Docker.
# deepvariant-> DeepVariant via Apptainer (CPU on this card — see note below).
CALLER="${CALLER:-gatk}"

# DeepVariant image + model type (only used when CALLER=deepvariant).
# NOTE: google/deepvariant *-gpu images ship CUDA 11.3 and run CPU-only on
#       Blackwell (RTX 50xx). Use CALLER=parabricks for GPU acceleration.
DV_VERSION="${DV_VERSION:-1.6.1}"
DV_MODEL_TYPE="${DV_MODEL_TYPE:-WGS}"          # WGS | WES | PACBIO | ONT_R104
DV_IMAGE="${DV_IMAGE:-docker://google/deepvariant:${DV_VERSION}}"

# ---- GPU / Parabricks (only used when CALLER=parabricks) --------------------
GPU_ENABLED="${GPU_ENABLED:-auto}"     # auto|true|false — auto = detect nvidia-smi
# Parabricks container (pull from NVIDIA NGC; requires a free NGC login).
# Pin a release new enough for Blackwell/sm_120 (4.4.x+, 2025).
PARABRICKS_VERSION="${PARABRICKS_VERSION:-4.5.0-1}"
PARABRICKS_IMAGE="${PARABRICKS_IMAGE:-nvcr.io/nvidia/clara/clara-parabricks:${PARABRICKS_VERSION}}"
# The 5070 Ti has 16 GB VRAM (Parabricks' floor); low-memory keeps steps in-budget.
PARABRICKS_LOW_MEMORY="${PARABRICKS_LOW_MEMORY:-true}"
# GPUs to expose to the container ("all" or a device count/list).
PARABRICKS_GPUS="${PARABRICKS_GPUS:-all}"

# ---- Optional stages --------------------------------------------------------
RUN_23ANDME="${RUN_23ANDME:-true}"   # extract ~640k chip positions in stage 06
ANNOTATOR="${ANNOTATOR:-vep}"        # vep (default) | annovar

# ---- Ancestry ---------------------------------------------------------------
# Number of ancestral populations for ADMIXTURE. With supervised mode driven by
# the 1000G .pop label file, this is set to the count of reference populations.
ADMIXTURE_K="${ADMIXTURE_K:-5}"      # 5 superpopulations (AFR/AMR/EAS/EUR/SAS)

# ---- Reference filenames (GRCh38 throughout) --------------------------------
# Downloaded/built by stage 00. Change URLs in 00_download_references.sh, not here.
REF_FASTA="${REF_FASTA:-${REF_DIR}/GRCh38/GRCh38.primary_assembly.genome.fa}"
DBSNP_VCF="${DBSNP_VCF:-${REF_DIR}/dbsnp/dbsnp.GRCh38.vcf.gz}"
CLINVAR_VCF="${CLINVAR_VCF:-${REF_DIR}/clinvar/clinvar.GRCh38.vcf.gz}"

# 1000 Genomes Phase 3 reference panel (PLINK2 pgen set), GRCh38.
KG_PREFIX="${KG_PREFIX:-${REF_DIR}/1000g/all_phase3}"      # .pgen/.pvar/.psam
KG_POP="${KG_POP:-${REF_DIR}/1000g/superpop.pop}"          # supervised labels
KG_ADMIX_P="${KG_ADMIX_P:-${REF_DIR}/1000g/ref.${ADMIXTURE_K}.P}"  # learned P

# 23andMe v5 chip positions (BED), for stage 06 export.
CHIP_BED="${CHIP_BED:-${REF_DIR}/chip/23andme_v5_positions.bed}"

# VEP cache location (populated by stage 00 when ANNOTATOR=vep).
VEP_CACHE_DIR="${VEP_CACHE_DIR:-${REF_DIR}/vep_cache}"
